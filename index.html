<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Korzinka — Hammasi bir joyda</title>
  <meta name="description" content="Korzinka mobil ilovasi — smartfoningizdagi qulay xaridlar va sodiqlik dasturi."/>



  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    :root {
      --red:    #E31313;
      --red-dk: #B80F0F;
      --navy:   #1C2340;
      --navy-lt:#2A3358;
      --white:  #FFFFFF;
      --bg:     #F7F7F9;
      --muted:  #6B7280;
      --border: rgba(0,0,0,.07);
      --radius: 18px;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }

    body {
      font-family:'Inter',sans-serif;
      background:var(--white);
      color:var(--navy);
      overflow-x:hidden;
    }

    /* ── NAV ── */
    nav {
      position:fixed; top:0; left:0; width:100%;
      padding:0 48px;
      height:68px;
      display:flex; align-items:center; justify-content:space-between;
      z-index:999;
      background:rgba(255,255,255,0.92);
      backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
    }
    .nav-logo {
      font-family:'Plus Jakarta Sans',sans-serif;
      font-size:1.45rem; font-weight:800;
      color:var(--navy);
      display:flex; align-items:center; gap:9px;
      letter-spacing:-0.03em;
      text-decoration:none;
    }
    .nav-logo .dot { color:var(--red); }
    .nav-logo .icon-wrap {
      width:34px; height:34px; border-radius:9px;
      background:var(--red);
      display:flex; align-items:center; justify-content:center;
      color:#fff; font-size:.9rem;
    }
    .nav-right { display:flex; align-items:center; gap:20px; }
    .nav-link {
      font-size:.9rem; font-weight:600;
      color:var(--muted); text-decoration:none;
      transition:color .2s;
    }
    .nav-link:hover { color:var(--navy); }
    .nav-cta {
      padding:10px 22px; border-radius:99px;
      background:var(--red); color:#fff;
      font-size:.88rem; font-weight:700;
      border:none; cursor:pointer; text-decoration:none;
      transition:background .2s, transform .2s;
      display:inline-flex; align-items:center; gap:7px;
    }
    .nav-cta:hover { background:var(--red-dk); transform:translateY(-1px); }

    /* ── HERO ── */
    .hero {
      min-height:100vh;
      padding:120px 48px 80px;
      display:flex; align-items:center;
      background:var(--white);
      position:relative; overflow:hidden;
    }
    /* subtle geometric bg */
    .hero::before {
      content:'';
      position:absolute; top:-120px; right:-80px;
      width:560px; height:560px; border-radius:50%;
      background:radial-gradient(circle, rgba(227,19,19,0.07) 0%, transparent 70%);
      pointer-events:none;
    }
    .hero::after {
      content:'';
      position:absolute; bottom:-80px; left:-60px;
      width:400px; height:400px; border-radius:50%;
      background:radial-gradient(circle, rgba(28,35,64,0.05) 0%, transparent 70%);
      pointer-events:none;
    }
    .hero-inner {
      max-width:1160px; width:100%; margin:auto;
      display:grid; grid-template-columns:1fr 1fr;
      gap:80px; align-items:center;
      position:relative; z-index:2;
    }

    .hero-eyebrow {
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 14px; border-radius:99px;
      border:1px solid rgba(227,19,19,0.2);
      background:rgba(227,19,19,0.05);
      font-size:.8rem; font-weight:700;
      color:var(--red); letter-spacing:.06em;
      text-transform:uppercase; margin-bottom:24px;
    }

    .hero-title {
      font-family:'Plus Jakarta Sans',sans-serif;
      font-size:clamp(2.6rem,4.5vw,4rem);
      font-weight:800; line-height:1.08;
      letter-spacing:-0.03em;
      color:var(--navy); margin-bottom:22px;
    }
    .hero-title em {
      font-style:normal; color:var(--red);
    }

    .hero-body {
      font-size:1.05rem; line-height:1.75;
      color:var(--muted); max-width:480px;
      margin-bottom:40px;
    }

    .hero-actions { display:flex; flex-direction:column; gap:12px; max-width:340px; }

    .btn-primary {
      display:inline-flex; align-items
